version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: job_tracker_db
    restart: always
    environment:
      MYSQL_DATABASE: job_tracker_db
      MYSQL_USER: jobtracker
      MYSQL_PASSWORD: jobtracker_password
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: job_tracker_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  mysql_data:
